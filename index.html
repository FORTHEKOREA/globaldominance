<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Dominance</title>
  <!-- Google Fonts for Modern UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <div id="app">
    <!-- TopHUD: Player Status -->
    <header id="top-bar" class="glass-panel">
      <h1 class="logo">GLOBAL DOMINANCE</h1>
      <div class="stats">
        <div class="stat-item">
          <span class="label">FUNDS</span>
          <span id="player-money" class="value text-green">$0</span>
        </div>
        <div class="stat-item">
          <span class="label">TROOPS</span>
          <span id="player-troops" class="value">0</span>
        </div>
        <div class="stat-item modernisation">
          <div class="mod-header">
            <span class="label">MODERNIZATION</span>
            <span id="mod-level" class="value text-blue">Lv 1</span>
          </div>
          <div class="progress-bar-container">
            <div id="mod-progress" class="progress-fill lv-1"></div>
          </div>
          <button id="btn-upgrade">UPGRADE (Cost: <span id="upgrade-cost">0</span>)</button>
        </div>
      </div>
    </header>

    <!-- Main Map Container -->
    <main id="map-container">
      <!-- SVG will be injected here by D3 -->
    </main>

    <!-- Side/Bottom Panel: Region Info & Actions -->
    <aside id="info-panel" class="glass-panel hidden">
      <div class="panel-header">
        <h2 id="region-name">Region Name</h2>
        <span id="region-owner" class="badge">Neutral</span>
      </div>
      <div class="panel-body">
        <div class="info-row">
          <span>Population:</span>
          <strong id="region-pop">0</strong>
        </div>
        <div class="info-row">
          <span>GDP per capita:</span>
          <strong id="region-gdp">$0</strong>
        </div>
        <div class="info-row">
          <span>Standing Army:</span>
          <strong id="region-army">0</strong>
        </div>
        <div class="info-row">
          <span>Mod Level:</span>
          <strong id="region-mod" class="text-blue">-</strong>
        </div>

        <div id="action-area" class="action-area">
          <!-- Buttons dynamically update based on context -->
          <button id="btn-ally" class="action-btn btn-blue hidden">Form Alliance</button>
          <button id="btn-attack" class="action-btn btn-red hidden">Attack / Move Here</button>
          <button id="btn-break-ally" class="action-btn btn-orange hidden">Break Alliance</button>
        </div>
      </div>
    </aside>

    <!-- Combat / Event Logs -->
    <div id="notification-area"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
